name: Auto-merge trend updates

# 클라우드 트렌드 에이전트가 claude/trends-auto 브랜치로 push하면
# (main 직접 push는 클라우드 git 프록시가 403으로 차단)
# 이 워크플로가 main에 자동 병합해서 GitHub Pages 재배포를 트리거한다.
on:
  push:
    branches: [claude/trends-auto]

permissions:
  contents: write

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge trend branch into main
        run: |
          git config user.name "trend-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin claude/trends-auto
          git merge --no-edit FETCH_HEAD
          git push origin main
