name: Trend auto-update

# 6시간마다 Claude가 한국 SNS 트렌드를 리서치해서 trends.json 갱신.
# 클라우드 라우틴(CCR)은 이 저장소에 쓰기 권한이 없어 (git proxy 403)
# GitHub Actions로 전환 — GITHUB_TOKEN은 자기 저장소 push가 기본 허용.
# 필요 시크릿: CLAUDE_CODE_OAUTH_TOKEN (claude setup-token 으로 발급)
on:
  schedule:
    - cron: "0 */6 * * *" # UTC 00/06/12/18 = KST 09/15/21/03
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # claude-code-action의 OIDC 인증에 필요

jobs:
  update-trends:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Claude 트렌드 리서치 & 파일 갱신
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }} # Claude GitHub App 설치 없이 기본 토큰 사용
          claude_args: '--allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch" --model sonnet'
          prompt: |
            너는 한국 SNS 트렌드 큐레이션 에이전트다. 이 저장소는 토스 인앱용
            SNS 트렌드 차트 앱('요즘 뭐가 유행이야? 👀')이다.
            git 명령은 절대 사용하지 마라 — 커밋·푸시는 워크플로 다음 단계가 처리한다.
            파일 편집까지만 완료하면 임무 성공이다. 빠르게 끝내라.

            ## 1단계: 리서치 (총 6회 이내 검색)
            - WebSearch 3~5회: '요즘 유행 밈 챌린지', '틱톡 인스타 트렌드 이번주',
              '편의점 품절 대란 신상', '유행어' 등
            - WebFetch로 https://theqoo.net/hot 시도 (실패 시 즉시 포기, 재시도 금지)
            - 신규 항목 최대 3개, 최근 7일 내 출처가 확인된 것만.
              확실한 게 없으면 기존 항목 status 조정만 해도 된다

            ## 2단계: trends.json 갱신
            기존 파일 스키마 그대로 (keyword/emoji/category(밈·챌린지|푸드|유행어)/
            status(rising|peak|steady|falling)/since/summary/description/usage/links).
            - updatedAt: 현재 시각 KST(UTC+9), "YYYY-MM-DD HH:MM" — 반드시 갱신
            - summary(상단 배너 문구) 갱신
            - 전체 12~16개 유지, 신규는 rising, 근거 있을 때만 기존 status를
              rising→peak→steady→falling 수순으로 조정, 확신 없으면 그대로

            ## 3단계: FALLBACK 동기화 (필수)
            루트 index.html과 miniapp/index.html 둘 다에서 '  var FALLBACK = '로
            시작하는 줄을 trends.json 전체의 한 줄 압축 JSON으로 교체:
            python3 json.dumps(data, ensure_ascii=False, separators=(",",":")) 사용,
            결과는 `  var FALLBACK = {...};` 형태

            ## 4단계: 검증
            python3로 trends.json 파싱 검증 + 두 index.html의 FALLBACK 줄에서
            JSON을 추출해 파싱 검증. 검증 통과하면 종료.

      - name: 타임스탬프 보정 (updatedAt을 실제 실행 시각 KST로 강제)
        run: |
          python3 - <<'EOF'
          import json, io, datetime
          now = (datetime.datetime.utcnow() + datetime.timedelta(hours=9)).strftime('%Y-%m-%d %H:%M')
          d = json.load(io.open('trends.json', encoding='utf-8'))
          d['updatedAt'] = now
          io.open('trends.json', 'w', encoding='utf-8').write(json.dumps(d, ensure_ascii=False, indent=2))
          compact = json.dumps(d, ensure_ascii=False, separators=(',', ':'))
          for p in ['index.html', 'miniapp/index.html']:
              lines = io.open(p, encoding='utf-8').read().split('\n')
              for i, l in enumerate(lines):
                  if l.lstrip().startswith('var FALLBACK = '):
                      lines[i] = '  var FALLBACK = ' + compact + ';'
              io.open(p, 'w', encoding='utf-8').write('\n'.join(lines))
          print('updatedAt ->', now)
          EOF

      - name: 커밋 & 푸시
        run: |
          git config user.name "trend-bot"
          git config user.email "actions@users.noreply.github.com"
          git add trends.json index.html miniapp/index.html
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            TS=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')
            git commit -m "trends: 자동 갱신 $TS KST"
            git push
          fi
