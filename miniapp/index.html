<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#17171c" media="(prefers-color-scheme: dark)">
<meta name="format-detection" content="telephone=no">
<title>요즘 트렌드 - 오늘의 SNS 유행 한눈에</title>
<style>
  :root {
    --accent: #3182f6;
    --accent-light: #e8f3ff;
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #191f28;
    --text-sub: #6b7684;
    --text-weak: #8b95a1;
    --divider: #f0f2f5;
    --skeleton: #eef1f4;
    --skeleton-hi: #f7f9fb;
    --rising: #f04452;
    --rising-bg: #fdedee;
    --peak: #ff8a00;
    --peak-bg: #fff3e0;
    --steady: #3182f6;
    --steady-bg: #e8f3ff;
    --falling: #8b95a1;
    --falling-bg: #f2f4f6;
    --radius: 20px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --accent: #4593fc;
      --accent-light: #1d2b42;
      --bg: #17171c;
      --card: #222229;
      --text: #e9ebee;
      --text-sub: #9ba2ac;
      --text-weak: #6f7680;
      --divider: #2c2c35;
      --skeleton: #2a2a33;
      --skeleton-hi: #33333d;
      --rising-bg: #3a2226;
      --peak-bg: #3a2e1c;
      --steady-bg: #1d2b42;
      --falling-bg: #2c2c35;
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overscroll-behavior-y: none;
    padding-top: env(safe-area-inset-top);
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 0 20px; }

  /* Header */
  header { padding: 26px 0 6px; }
  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: .4px;
    color: var(--accent); margin-bottom: 6px;
  }
  h1 { font-size: 25px; font-weight: 800; letter-spacing: -0.6px; line-height: 1.3; }
  h1 .accent { color: var(--accent); }
  .updated {
    margin-top: 6px;
    font-size: 11px; font-weight: 500;
    color: var(--text-weak);
    font-variant-numeric: tabular-nums;
  }
  .updated .dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:#2ac769; margin-right:5px; vertical-align:1px; }

  /* Summary banner */
  .summary {
    margin-top: 16px;
    background: linear-gradient(135deg, #3182f6, #5a9cf8);
    color: #fff;
    border-radius: var(--radius);
    padding: 18px 20px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    box-shadow: 0 4px 16px rgba(49,130,246,.22);
  }
  .summary .summary-title { font-size: 12px; font-weight: 700; opacity: .85; margin-bottom: 4px; letter-spacing: .3px; }

  /* Filter chips */
  .chips {
    display: flex; gap: 8px;
    overflow-x: auto;
    padding: 20px 20px 4px;
    margin: 0 -20px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    padding: 9px 16px;
    border-radius: 100px;
    background: var(--card);
    color: var(--text-sub);
    font-size: 14px; font-weight: 600;
    border: none;
    cursor: pointer;
    transition: transform .1s;
    font-family: inherit;
  }
  .chip:active { transform: scale(.95); }
  .chip.active { background: var(--text); color: var(--card); }
  .chip:focus-visible, .row:focus-visible, .link-btn:focus-visible, .share-btn:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  /* Trend chart */
  .chart {
    margin-top: 14px;
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .row {
    display: flex; align-items: center; gap: 12px;
    width: 100%;
    padding: 15px 16px;
    border: none; background: none; text-align: left;
    font-family: inherit; color: inherit;
    cursor: pointer;
    transition: background .15s;
  }
  .row:active { background: var(--divider); }
  .row + .row { border-top: 1px solid var(--divider); }
  .row .rank {
    flex: 0 0 24px;
    text-align: center;
    font-size: 17px; font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: var(--text-weak);
    letter-spacing: -0.5px;
  }
  .row.top .rank { color: var(--accent); }
  .row .emoji {
    flex: 0 0 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    font-size: 23px;
    background: var(--bg);
    border-radius: 14px;
  }
  .row .info { flex: 1; min-width: 0; }
  .row .kw {
    font-size: 15.5px; font-weight: 700; letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap; overflow: hidden;
  }
  .row .kw .kw-text { overflow: hidden; text-overflow: ellipsis; }
  .badge {
    font-size: 10.5px; font-weight: 700;
    padding: 2.5px 7px; border-radius: 6px;
    flex: 0 0 auto;
  }
  .badge.rising { color: var(--rising); background: var(--rising-bg); }
  .badge.peak { color: var(--peak); background: var(--peak-bg); }
  .badge.steady { color: var(--steady); background: var(--steady-bg); }
  .badge.falling { color: var(--falling); background: var(--falling-bg); }
  .empty {
    text-align: center; color: var(--text-weak);
    padding: 56px 20px; font-size: 14px; line-height: 1.7;
  }
  .empty b { color: var(--text-sub); }

  /* Entrance motion */
  @keyframes rise-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }
  .chart.animate .row { animation: rise-in .38s cubic-bezier(.22,.68,.36,1) both; }

  /* Skeleton */
  @keyframes shimmer { from { background-position: 180% 0; } to { background-position: -20% 0; } }
  .sk-row { display:flex; align-items:center; gap:12px; padding:15px 16px; }
  .sk-row + .sk-row { border-top: 1px solid var(--divider); }
  .sk {
    background: linear-gradient(90deg, var(--skeleton) 40%, var(--skeleton-hi) 50%, var(--skeleton) 60%);
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
    border-radius: 8px;
  }
  .sk.c { width: 42px; height: 42px; border-radius: 14px; flex: 0 0 42px; }
  .sk.n { width: 20px; height: 20px; flex: 0 0 20px; }
  .sk-lines { flex: 1; }
  .sk.l1 { width: 45%; height: 14px; }

  footer { text-align: center; padding: 28px 0 8px; font-size: 12px; color: var(--text-weak); }

  /* In-list banner ad (토스 인앱 광고) — 순위 리스트 3위 아래 삽입, 토스 앱 안에서만 표시 */
  .ad-card {
    padding: 10px 16px;
    border-top: 1px solid var(--divider);
    border-bottom: 1px solid var(--divider);
    background: var(--card);
  }
  .ad-card .ad-slot { width: 100%; height: 96px; }

  /* Bottom sheet */
  .sheet-dim {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    z-index: 50;
  }
  .sheet-dim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-width: 480px; margin: 0 auto;
    background: var(--card);
    border-radius: 24px 24px 0 0;
    transform: translateY(105%);
    transition: transform .3s cubic-bezier(.32,.72,.35,1);
    z-index: 51;
    padding: 12px 24px calc(20px + env(safe-area-inset-bottom));
    max-height: 82vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .sheet.open { transform: translateY(0); }
  .sheet .handle { width: 40px; height: 4px; background: var(--divider); border-radius: 2px; margin: 0 auto 18px; }
  .sheet .s-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .sheet .s-emoji { flex:0 0 56px; height:56px; font-size:32px; display:flex; align-items:center; justify-content:center; background:var(--bg); border-radius:18px; }
  .sheet .s-kw { font-size: 20px; font-weight: 800; letter-spacing:-0.4px; }
  .sheet .s-meta { font-size: 12px; color: var(--text-weak); margin-top: 3px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .sheet .s-desc { font-size: 15px; color: var(--text); line-height: 1.65; margin-bottom: 14px; }
  .sheet .s-usage {
    background: var(--bg); border-radius: 14px;
    padding: 14px 16px; font-size: 13px; color: var(--text-sub);
    margin-bottom: 20px; line-height: 1.6;
  }
  .sheet .s-usage b { color: var(--text); font-size: 12px; display:block; margin-bottom:4px; }
  .sheet .s-links-title { font-size: 13px; font-weight: 700; color: var(--text-weak); margin-bottom: 10px; }
  .link-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: none;
    background: var(--bg);
    font-size: 15px; font-weight: 600; color: var(--text);
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform .1s;
    font-family: inherit; text-align: left;
  }
  .link-btn:active { transform: scale(.98); }
  .link-btn .li { flex:0 0 34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; color:#fff; }
  .li.instagram { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
  .li.youtube { background:#ff0000; }
  .li.naver { background:#03c75a; }
  .li.x { background:#000; }
  .link-btn .chev { margin-left: auto; color: var(--text-weak); }

  .share-btn {
    display: block; width: 100%;
    margin-top: 14px;
    padding: 15px;
    border: none; border-radius: 14px;
    background: var(--accent); color: #fff;
    font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    transition: transform .1s, opacity .15s;
  }
  .share-btn:active { transform: scale(.98); opacity: .9; }

  /* Toast */
  .toast {
    position: fixed;
    left: 50%; bottom: calc(32px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(16px);
    background: rgba(25,31,40,.92);
    color: #fff;
    font-size: 13.5px; font-weight: 600;
    padding: 12px 20px;
    border-radius: 100px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 60;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">SNS 트렌드 차트</div>

  <div class="sheet-dim" id="sheetDim"></div>

  </div>

  <div class="toast" id="toast"></div>

  var $ = function (id) { return document.getElementById(id); };

  function buildUrl(link) {
    var q = link.q || '';
    switch (link.type) {
      case 'instagram':
        return 'https://www.instagram.com/explore/tags/' + encodeURIComponent(q.replace(/\s+/g, '')) + '/';
      case 'youtube':
        return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q);
      case 'naver':
        return 'https://search.naver.com/search.naver?query=' + encodeURIComponent(q);
      case 'x':
        return 'https://x.com/search?q=' + encodeURIComponent(q);
      default:
        return link.url || '#';
    }
  }

  // 토스 인앱 웹뷰 호환 외부 링크 열기
  function openLink(url) {
    var w = null;
    try { w = window.open(url, '_blank'); } catch (e) { w = null; }
    if (w) {
      try { w.opener = null; } catch (e) {}
    } else {
      window.location.href = url;
    }
  }

  function typeInitial(type) {
    if (type === 'instagram') return 'IG';
    if (type === 'youtube') return '▶';
    if (type === 'naver') return 'N';
    if (type === 'x') return 'X';
    return '🔗';
  }

  var toastTimer = null;
  function toast(msg) {
    var t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove('show'); }, 2200);
  }

  // "YYYY-MM-DD HH:MM" 또는 "YYYY-MM-DD" 지원
  function parseUpdatedAt(s) {
    if (!s) return null;
    var d = new Date(String(s).replace(' ', 'T') + (s.length <= 10 ? 'T00:00:00' : ':00'));
    return isNaN(d.getTime()) ? null : d;
  }

  function pad2(n) { return (n < 10 ? '0' : '') + n; }

  function renderUpdated(updatedAt) {
    var d = parseUpdatedAt(updatedAt);
    var label = $('updatedLabel');
    if (!d) { label.textContent = ''; return; }
    var text = d.getFullYear() + '.' + pad2(d.getMonth() + 1) + '.' + pad2(d.getDate());
    if (String(updatedAt).length > 10) text += ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
    label.innerHTML = '<span class="dot"></span>';
    label.appendChild(document.createTextNode(text + ' 업데이트'));
  }

  function renderChips() {

    CATEGORIES.forEach(function (cat) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'chip' + (cat === activeCategory ? ' active' : '');
      b.textContent = cat;
      b.addEventListener('click', function () {
        activeCategory = cat;
        renderChips();
        renderList();
      });
      box.appendChild(b);
    });
  }

    var box = $('list');
    box.innerHTML = '';
    var items = data.trends.slice().sort(function (a, b) {
      var oa = (a.status in statusOrder) ? statusOrder[a.status] : 9;
      var ob = (b.status in statusOrder) ? statusOrder[b.status] : 9;
      return oa - ob;
    });
    if (activeCategory !== '전체') {
      items = items.filter(function (t) { return t.category === activeCategory; });
    }
    if (!items.length) {
      box.innerHTML = '<div class="empty"><b>이 카테고리는 아직 비어 있어요</b><br>다른 카테고리를 눌러 트렌드를 둘러보세요</div>';
      return;
    }
    if (firstRender) { box.classList.add('animate'); firstRender = false; }
    else { box.classList.remove('animate'); }

    items.forEach(function (t, i) {
      var st = STATUS[t.status] || STATUS.steady;
      var row = document.createElement('button');
      row.type = 'button';
      row.className = 'row' + (i < 3 ? ' top' : '');
      row.style.animationDelay = (i * 30) + 'ms';
      row.innerHTML =
        '<span class="rank">' + (i + 1) + '</span>' +
        '<span class="emoji">' + t.emoji + '</span>' +
        '<span class="info">' +
          '<span class="kw"><span class="kw-text"></span><span class="badge ' + st.cls + '">' + st.label + '</span></span>' +
        '</span>';
      row.querySelector('.kw-text').textContent = t.keyword;
      row.addEventListener('click', function () { openSheet(t); });
      box.appendChild(row);
    });

    // 리스트가 다시 그려질 때마다 광고 모듈에 알림 (광고 카드 재삽입용)
    document.dispatchEvent(new Event('trend:rendered'));
  }

  var currentTrend = null;

  function openSheet(t) {
    currentTrend = t;
    var st = STATUS[t.status] || STATUS.steady;
    $('sEmoji').textContent = t.emoji;
    $('sKw').textContent = t.keyword;

    var meta = $('sMeta');
    meta.innerHTML = '<span class="badge ' + st.cls + '">' + st.label + '</span>';
    var m1 = document.createElement('span'); m1.textContent = t.category; meta.appendChild(m1);
    var m2 = document.createElement('span'); m2.textContent = '·'; meta.appendChild(m2);
    var m3 = document.createElement('span'); m3.textContent = (t.since || '') + ' 시작'; meta.appendChild(m3);

    $('sDesc').textContent = t.description;
    $('sUsage').innerHTML = '<b>💡 이렇게 써요</b>';
    $('sUsage').appendChild(document.createTextNode(t.usage || ''));

    var linksBox = $('sLinks');
    linksBox.innerHTML = '';
    (t.links || []).forEach(function (l) {
      var url = buildUrl(l);
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'link-btn';
      btn.innerHTML =
        '<span class="li ' + l.type + '">' + typeInitial(l.type) + '</span>' +
        '<span></span><span class="chev">›</span>';
      btn.children[1].textContent = l.label + ' "' + (l.q || '') + '"';
      btn.addEventListener('click', function () { openLink(url); });
      linksBox.appendChild(btn);
    });

    $('sheet').classList.add('open');
    $('sheetDim').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSheet() {
    $('sheet').classList.remove('open');
    $('sheetDim').classList.remove('open');
    document.body.style.overflow = '';
  }
  $('sheetDim').addEventListener('click', closeSheet);

  // 공유하기 — Web Share API → 클립보드 폴백
  $('shareBtn').addEventListener('click', function () {
    if (!currentTrend) return;
    var t = currentTrend;
    var text = '[요즘 뭐가 유행이야?] ' + t.emoji + ' ' + t.keyword + ' — ' + t.summary;
    if (navigator.share) {
      navigator.share({ title: t.keyword, text: text, url: location.href }).catch(function () {});
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text + ' ' + location.href)
        .then(function () { toast('내용을 복사했어요. 붙여넣어 공유하세요!'); })
        .catch(function () { toast('복사에 실패했어요. 다시 눌러주세요'); });
    } else {
      toast('이 환경에서는 공유를 지원하지 않아요');
    }
  });

  // 스와이프 다운으로 시트 닫기
  (function () {
    var startY = null;
    var sheet = $('sheet');
    sheet.addEventListener('touchstart', function (e) {
      if (sheet.scrollTop <= 0) startY = e.touches[0].clientY;
      else startY = null;
    }, { passive: true });
    sheet.addEventListener('touchmove', function (e) {
      if (startY === null) return;
      var dy = e.touches[0].clientY - startY;
      if (dy > 70) { closeSheet(); startY = null; }
    }, { passive: true });
  })();

  function boot(d) {
    data = d;
    renderUpdated(d.updatedAt);
    if (d.summary) {
      $('summaryText').textContent = d.summary;
      $('summaryBox').style.display = '';
    }
    renderChips();
    renderList();
  }

  // 데이터는 항상 GitHub Pages 원격에서 로드 — 앱인토스(.ait) 패키지로 배포해도
  // 재출시 없이 6시간 파이프라인 갱신이 반영된다
  var DATA_URL = 'https://jinoflow0624.github.io/sns-trend/trends.json';

  function fetchTrends(onDone) {
    if (typeof fetch !== 'function') { onDone(null); return; }
    fetch(DATA_URL + '?v=' + Date.now(), { cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function (d) { lastFetchAt = Date.now(); onDone(d); })
      .catch(function () { onDone(null); });
  }

  // 6시간마다 자동 갱신: 주기 확인 + 앱 복귀(웹뷰 포그라운드) 시 확인
  function refreshIfStale() {
    if (Date.now() - lastFetchAt < REFRESH_MS) return;
    fetchTrends(function (d) {
      if (!d) return;
      if (!data || d.updatedAt !== data.updatedAt) {
        boot(d);
        toast('새 트렌드로 업데이트했어요 ✨');
      }
    });
  }
  setInterval(refreshIfStale, CHECK_MS);
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) refreshIfStale();
  });

  // 초기 로드: trends.json (배포) → 실패 시 임베디드 데이터 (로컬 미리보기)
  fetchTrends(function (d) { boot(d || FALLBACK); });
})();
</script>
<script type="module">
import { TossAds } from '@apps-in-toss/web-framework';

// 순위 리스트 사이(3위 아래)에 끼워 넣는 배너 광고 (토스 인앱 광고 SDK)
// 토스 앱 밖(웹 미리보기)에서는 아무것도 표시하지 않음
var AD_GROUP_ID = 'ait.v2.live.71823d2399074a04';
var AD_POSITION = 3; // 이 순위 바로 아래에 광고 카드 삽입

var sdkReady = false;
var attached = null;

var adCard = document.createElement('div');
adCard.className = 'ad-card';
var adSlot = document.createElement('div');
adSlot.className = 'ad-slot';
adCard.appendChild(adSlot);

function destroyAd() {
  if (attached) {
    try { attached.destroy(); } catch (e) {}
    attached = null;
  }
}

// 리스트 렌더 후 3위(항목이 적으면 마지막) 아래에 광고 카드를 넣고 배너 부착
function placeAd() {
  if (!sdkReady) return;
  var rows = document.getElementById('list').querySelectorAll('.row');
  if (!rows.length) return; // 빈 카테고리 — 광고도 생략
  destroyAd();
  var anchor = rows[Math.min(AD_POSITION, rows.length) - 1];
  anchor.insertAdjacentElement('afterend', adCard);
  attached = TossAds.attachBanner(AD_GROUP_ID, adSlot, {
    theme: 'auto',
    callbacks: {
      onAdFailedToRender: function () { adCard.remove(); }
    }
  });
}

try {
  if (TossAds.initialize.isSupported && TossAds.initialize.isSupported()) {
    TossAds.initialize({
      callbacks: {
        onInitialized: function () { sdkReady = true; placeAd(); },
        onInitializationFailed: function () { sdkReady = false; }
      }
    });
    document.addEventListener('trend:rendered', placeAd);
    window.addEventListener('pagehide', destroyAd);
  }
} catch (e) { /* 광고 미지원 환경 — 무시 */ }
</script>
